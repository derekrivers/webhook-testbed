<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test Record</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f3f4f6;
        color: #111827;
      }

      main {
        width: min(100% - 2rem, 720px);
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 20px 45px rgba(15, 23, 42, 0.12);
        padding: 2rem;
      }

      h1 {
        margin-top: 0;
        margin-bottom: 0.5rem;
        font-size: clamp(1.75rem, 3vw, 2.25rem);
      }

      p {
        margin-top: 0;
        margin-bottom: 1.5rem;
        color: #4b5563;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        overflow: hidden;
        border-radius: 12px;
      }

      th,
      td {
        padding: 0.9rem 1rem;
        text-align: left;
        border-bottom: 1px solid #e5e7eb;
      }

      th {
        background: #111827;
        color: #ffffff;
        font-weight: 600;
      }

      tbody tr:last-child td {
        border-bottom: none;
      }

      tbody tr:nth-child(even) {
        background: #f9fafb;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Test Log</h1>
      <p>This page records a simple test completion entry in a table.</p>

      <table aria-label="Test completion log">
        <thead>
          <tr>
            <th scope="col">Date</th>
            <th scope="col">Message</th>
          </tr>
        </thead>
        <tbody id="test-log"></tbody>
      </table>
    </main>

    <script type="module">
      const tableBody = document.getElementById('test-log');
      const row = document.createElement('tr');
      const dateCell = document.createElement('td');
      const messageCell = document.createElement('td');

      const formattedDate = new Date().toLocaleDateString(undefined, {
        year: 'numeric',
        month: 'long',
        day: 'numeric',
      });

      dateCell.textContent = formattedDate;
      messageCell.textContent = 'Test completed';

      row.append(dateCell, messageCell);
      tableBody?.append(row);
    </script>
  </body>
</html>
